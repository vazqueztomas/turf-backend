name: Daily Turf Update

on:
  schedule:
    - cron: "0 6 * * *"   # todos los días a las 6 AM UTC
    - cron: "0 7 1 * *"   # el 1ro de cada mes a las 7 AM UTC (sync histórico del mes anterior)
  workflow_dispatch:
    inputs:
      sync_historical:
        description: "Sync histórico (YYYY-MM-DD:YYYY-MM-DD, opcional)"
        required: false

jobs:
  daily-update:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 6 * * *'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync upcoming PDFs
        env:
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
        run: python scripts/import_san_isidro.py --tipo upcoming

      - name: Sync histórico manual (si se especificó rango)
        if: github.event.inputs.sync_historical != ''
        env:
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
        run: |
          RANGE="${{ github.event.inputs.sync_historical }}"
          START=$(echo $RANGE | cut -d: -f1)
          END=$(echo $RANGE | cut -d: -f2)
          python scripts/import_san_isidro.py --tipo resultados --start $START --end $END

  monthly-historical:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 7 1 * *'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync histórico del mes anterior
        env:
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
        run: |
          START=$(date -d "$(date +%Y-%m-01) -1 month" +%Y-%m-%d)
          END=$(date -d "$(date +%Y-%m-01) -1 day" +%Y-%m-%d)
          echo "Syncing $START to $END"
          python scripts/import_san_isidro.py --tipo resultados --start $START --end $END
